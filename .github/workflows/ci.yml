name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # TODO: Switch to the linux x86_64 release binary after a ry release
      # containing `typeshed validate` is published.
      - name: Check out ry source
        uses: actions/checkout@v4
        with:
          repository: sims1253/ry
          # Tracks the ry branch whose loader understands this repo's
          # schema (no_return, captures_promise, data_mask_source). Bump when
          # the schema grows. TODO: re-pin to a main-branch commit once sims1253/ry#20 merges (bare-SHA cross-repo fetches are refused by upload-pack).
          ref: audit-0.6.0-precision
          path: ry
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ry -> target
      - name: Build ry
        run: cargo build --manifest-path ry/Cargo.toml -p ry-cli --release
      - name: Validate stubs
        run: ry/target/release/ry typeshed validate stubs/

  generators:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Install R packages (generator JSON I/O + audited namespaces)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::jsonlite
            any::purrr
            any::dplyr
            any::mirai
            any::carrier
      - name: Standard globals are current
        run: Rscript scripts/gen_standard_globals.R --check
      - name: Audit stubs against installed namespaces
        # Skips stubs whose package is not installed; the install list
        # above pins the coverage we always get in CI.
        run: Rscript scripts/audit_typeshed.R
